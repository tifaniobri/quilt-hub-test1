{% extends "base.html" %}

{% block title %}Quilt Hub — Gallery{% endblock %}

{% block content %}
<h1>Gallery</h1>
<p>A collection of quilt block patterns and designs.</p>

<div class="grid">
  {% for i in range(6) %}
  <div class="card">
    <img
      src="{{ url_for('static', filename='images/placeholder.svg') }}"
      alt="Quilt block pattern {{ i + 1 }}"
    >
    <p>Quilt Block {{ i + 1 }}</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
